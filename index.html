<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yankee Sniper: 11 Shots for Freedom</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a00; color: #e8d5a3; font-family: 'Georgia', serif; overflow: hidden; }
canvas { display: block; cursor: crosshair; }
#ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#hud { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px 16px; border: 2px solid #8b6914; border-radius: 4px; }
#hud h3 { color: #f0c040; font-size: 14px; margin-bottom: 4px; }
#hud p { font-size: 13px; color: #e8d5a3; }
#target-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.92); border: 2px solid #8b6914; border-radius: 8px; padding: 18px 26px; max-width: 620px; width: 90%; text-align: center; display: none; max-height: 85vh; overflow-y: auto; }
#target-info h2 { color: #f0c040; font-size: 17px; margin-bottom: 6px; }
#target-info .state { color: #c8a84b; font-size: 12px; margin-bottom: 8px; }
#target-info .capital { font-size: 13px; margin-bottom: 8px; color: #a0d0a0; }
#target-info .oneliner { font-style: italic; color: #e0c080; font-size: 14px; margin-bottom: 8px; border-left: 3px solid #8b6914; padding-left: 10px; text-align: left; }
#target-info .dying { color: #ff9060; font-size: 12px; margin-bottom: 6px; }
#target-info .response { color: #60c0ff; font-size: 12px; font-style: italic; margin-bottom: 12px; }
#target-info hr { border-color: #8b6914; margin: 10px 0; }
#mcas-section { display: none; }
#mcas-section h3 { color: #f0c040; font-size: 14px; margin-bottom: 10px; }
.mcas-q { background: rgba(255,255,255,0.05); border: 1px solid #8b6914; border-radius: 6px; padding: 12px; margin-bottom: 10px; text-align: left; }
.mcas-q .qtext { font-size: 13px; margin-bottom: 8px; color: #ffffff; }
.mcas-choice { display: block; background: rgba(255,255,255,0.04); border: 1px solid #555; border-radius: 4px; padding: 6px 10px; margin-bottom: 5px; cursor: pointer; font-size: 12px; text-align: left; pointer-events: all; transition: background 0.2s; color: #ffffff; }
.mcas-choice:hover { background: rgba(255,200,0,0.15); }
.mcas-choice.correct { background: rgba(0,180,0,0.25); border-color: #00cc44; color: #80ff80; }
.mcas-choice.wrong { background: rgba(200,0,0,0.25); border-color: #cc2200; color: #ff8060; }
.mcas-explain { font-size: 11px; color: #a0d080; margin-top: 6px; display: none; font-style: italic; }
#mcas-score { font-size: 13px; color: #f0c040; margin-top: 8px; display: none; }
#splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
#splash h1 { color: #f0c040; font-size: 36px; text-align: center; margin-bottom: 10px; text-shadow: 0 0 20px #8b6914; }
#splash p { color: #e8d5a3; font-size: 15px; text-align: center; max-width: 500px; margin-bottom: 8px; line-height: 1.6; }
#splash .subtitle { color: #c8a84b; font-size: 13px; margin-bottom: 24px; }
